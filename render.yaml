services:
  - type: web
    name: fitness-planner-api
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -e .
    startCommand: ./scripts/render_start.sh
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-planner-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: SILICONFLOW_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: SILICONFLOW_MODEL
        value: Qwen/Qwen3.6-35B-A3B

databases:
  - name: fitness-planner-db
    databaseName: fitness_planner
    plan: free
